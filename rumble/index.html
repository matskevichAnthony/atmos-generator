<meta charset="utf-8">
<title>Industrial Rumble Kick — Strudel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./rumble.css">
<script src="/shared/capture.js"></script>

<main data-js-rumble>
  <div class="hazard"></div>

  <header class="head">
    <div class="head__title">
      <h1>RUMBLE<span>KICK</span></h1>
      <p>Индустриальный кик: транзиент + рамбл-бас. Четыре способа генерации рамбла.</p>
    </div>
    <div class="transport">
      <span class="led" data-js-led></span>
      <button class="btn btn--play" data-js-play>▶ PLAY</button>
      <button class="btn" data-js-stop>■ STOP</button>
      <button class="btn" data-js-random>🎲 RND</button>
      <button class="btn" data-js-copy>⧉ COPY</button>
      <button class="btn" data-js-rec>● REC WAV</button>
      <span class="rectime" data-js-rectime></span>
    </div>
  </header>

  <section class="types">
    <h2>Тип рамбла</h2>
    <input type="hidden" data-param="rtype" value="reverb">
    <div class="seg" data-js-types>
      <button class="seg__btn is-active" data-type="reverb"><b>Reverb</b><i>хвост реверба</i></button>
      <button class="seg__btn" data-type="decay"><b>Decay</b><i>длинный спад</i></button>
      <button class="seg__btn" data-type="delay"><b>Delay</b><i>фидбэк-ролл</i></button>
      <button class="seg__btn" data-type="sub"><b>Sub</b><i>дрон-саб</i></button>
    </div>
  </section>

  <div class="grid">
    <section class="panel panel--kick">
      <h2>◢ Кик — транзиент</h2>
      <label class="ctl">
        <span>Строй <output data-out="kpitch"></output></span>
        <input type="range" data-param="kpitch" min="24" max="45" step="1" value="33">
      </label>
      <label class="ctl">
        <span>Панч (питч-огиб.) <output data-out="kpunch"></output> пт</span>
        <input type="range" data-param="kpunch" min="0" max="48" step="1" value="24">
      </label>
      <label class="ctl">
        <span>Спад питча <output data-out="kpdec"></output> с</span>
        <input type="range" data-param="kpdec" min="0.02" max="0.4" step="0.01" value="0.14">
      </label>
      <label class="ctl">
        <span>Тело <output data-out="kbody"></output> с</span>
        <input type="range" data-param="kbody" min="0.04" max="0.3" step="0.01" value="0.13">
      </label>
      <label class="ctl">
        <span>Драйв <output data-out="kdrive"></output></span>
        <input type="range" data-param="kdrive" min="0" max="4" step="0.1" value="1.3">
      </label>
      <label class="ctl">
        <span>LPF <output data-out="klpf"></output> Гц</span>
        <input type="range" data-param="klpf" min="400" max="8000" step="50" value="3000">
      </label>
      <label class="ctl ctl--check">
        <input type="checkbox" data-param="kclick">
        <span>Клик сверху (атака)</span>
      </label>
    </section>

    <section class="panel panel--rumble">
      <h2>◤ Рамбл — бас-хвост</h2>
      <label class="ctl">
        <span>Нота баса <output data-out="rnote"></output></span>
        <input type="range" data-param="rnote" min="18" max="40" step="1" value="26">
      </label>
      <label class="ctl" data-for="reverb decay delay">
        <span>Хвост (длина) <output data-out="rlen"></output></span>
        <input type="range" data-param="rlen" min="0" max="1" step="0.01" value="0.6">
      </label>
      <label class="ctl" data-for="reverb delay">
        <span>Пространство <output data-out="rspace"></output></span>
        <input type="range" data-param="rspace" min="0" max="1" step="0.01" value="0.55">
      </label>
      <label class="ctl">
        <span>Тон / LPF <output data-out="rlpf"></output> Гц</span>
        <input type="range" data-param="rlpf" min="80" max="900" step="10" value="220">
      </label>
      <label class="ctl">
        <span>Сатурация <output data-out="rdist"></output></span>
        <input type="range" data-param="rdist" min="0" max="4" step="0.1" value="1.4">
      </label>
      <label class="ctl">
        <span>Уровень <output data-out="rgain"></output></span>
        <input type="range" data-param="rgain" min="0" max="1.4" step="0.05" value="0.85">
      </label>
      <label class="ctl">
        <span>Темп <output data-out="tempo"></output> BPM</span>
        <input type="range" data-param="tempo" min="120" max="180" step="1" value="138">
      </label>
    </section>
  </div>

  <section class="presets">
    <h2>Пресеты характера</h2>
    <div class="presets__row" data-js-presets>
      <button class="btn btn--ghost" data-preset="berlin">Berlin</button>
      <button class="btn btn--ghost" data-preset="rotterdam">Rotterdam</button>
      <button class="btn btn--ghost" data-preset="warehouse">Warehouse</button>
      <button class="btn btn--ghost" data-preset="darksub">Dark Sub</button>
    </div>
  </section>

  <section class="code">
    <div class="code__bar"><h2>Strudel</h2><span class="code__hint">вставь в <a href="/">главный REPL</a></span></div>
    <pre data-js-code>—</pre>
  </section>
</main>

<script type="module" src="./rumble.js"></script>
